# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/guides/orchestrate/jobs-steps/#jobs-overview & https://circleci.com/docs/reference/configuration-reference/#jobs
jobs:
  test:
    docker:
      - image: clojure:temurin-25-lein-trixie
    resource_class: small
    steps:
      - checkout
      - run:
          name: Run unit tests
          command: lein check && lein test

      - run:
          name: Build uberjar
          command: lein uberjar

      - run:
          name: Install curl
          command: apt-get update && apt-get install -y curl

      - run:
          name: Start server
          command: lein ring server-headless &> /tmp/server.log
          background: true

      - run:
          name: Wait for server
          command: sleep 45 && curl -s http://localhost:3000 > /dev/null || (echo "Server failed to start" && cat /tmp/server.log && exit 1)

      - run:
          name: Run integration test
          command: curl -s http://localhost:3000 | grep -q '<a href="all-pronouns">' || (echo "Front page spot-check failed" && exit 1)

workflows:
  test-workflow:
    jobs:
      - test
